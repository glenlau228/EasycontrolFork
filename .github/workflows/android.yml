name: Build EasyControl APK (Fixed Permissions)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 👇 关键！让 Git 保留可执行权限
          lfs: false
          token: ${{ github.token }}

      - name: Force executable permission for gradlew
        run: |
          # 即使文件无 x 权限，也强制添加
          touch gradlew 2>/dev/null || true
          chmod +x gradlew gradlew.bat || echo "Ignoring chmod errors..."

      - name: Verify gradlew exists and is executable
        run: |
          ls -la gradlew*
          test -x gradlew && echo "✅ gradlew is executable" || echo "⚠️ Still not executable"
          ./gradlew --version 2>&1 | head -n 2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-tools: "platform-tools;34.0.0,build-tools;34.0.0,platforms;android-34"

      # ✅ 新增：确保构建前清理，防止 UP-TO-DATE 跳过构建
      - name: Clean Project
        run: ./gradlew clean --no-daemon

      - name: Build Debug APK (with clean)
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # 🔍 新增：验证 APK 是否真的生成
      - name: Verify APK exists
        run: |
          echo "🔍 Searching for APK files..."
          find . -name "*.apk" -exec ls -lh {} \;
          
          # 检查默认路径
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Found APK at: app/build/outputs/apk/debug/app-debug.apk"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ Default APK path not found"
            # 搜索其他可能的路径
            find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found in app/build/outputs"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easycontrol-debug
          # ✅ 改进路径匹配，增加容错性
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/*.apk
            **/app-debug.apk
            **/*debug*.apk
