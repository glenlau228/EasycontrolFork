name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制使用 Node.js 24，避免警告

    steps:
    # 1. 拉取代码
    - name: Checkout source
      uses: actions/checkout@v4

    # 2. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 安装 Android SDK
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # 4. 给 gradlew 脚本加权限
    - name: Grant execute permission for Gradlew
      run: chmod +x gradlew

    # 5. 编译 APK（先用 Debug 测试）
    - name: Build APK
      run: ./gradlew assembleDebug

    # 6. 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: EasycontrolFork-APK
        path: app/build/outputs/apk/debug/*.apk
