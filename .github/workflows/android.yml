name: Universal Build for EasyControl

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x "$GITHUB_WORKSPACE/gradlew"

      - name: Auto-detect and fix source location
        run: |
          # Find where Java source files actually are
          JAVA_SRC_PATH=$(find . -name "*.java" -path "*/src/main/java/*" -exec dirname {} \; | head -n 1 | xargs dirname | xargs dirname | xargs dirname)
          
          if [ "$JAVA_SRC_PATH" != "./app" ]; then
            echo "Found Java sources at: $JAVA_SRC_PATH"
            echo "Moving sources to app/src/main/java/"
            
            # Create app directory if it doesn't exist
            mkdir -p app/src/main/java
            
            # Move all Java source files
            if [ -d "$JAVA_SRC_PATH/src/main/java" ]; then
              cp -r "$JAVA_SRC_PATH/src/main/java/"* app/src/main/java/
            fi
            
            # Copy other necessary source files
            for dir in res assets manifest; do
              if [ -d "$JAVA_SRC_PATH/src/main/$dir" ]; then
                mkdir -p app/src/main/$dir
                cp -r "$JAVA_SRC_PATH/src/main/$dir/"* app/src/main/$dir/
              fi
            done
            
            # Copy AndroidManifest.xml if it's in the original location
            if [ -f "$JAVA_SRC_PATH/src/main/AndroidManifest.xml" ]; then
              cp "$JAVA_SRC_PATH/src/main/AndroidManifest.xml" app/src/main/
            fi
          fi

      - name: Ensure correct build configuration
        run: |
          # Ensure app/build.gradle has proper configuration
          if [ -f "app/build.gradle" ]; then
            # Add sourceSets if not present
            if ! grep -q "sourceSets" app/build.gradle; then
              sed -i '/android {/a \
          sourceSets {\
              main {\
                  java.srcDirs = ["src/main/java"]\
              }\
          }' app/build.gradle
            fi
          fi

      - name: Clean and build
        run: "$GITHUB_WORKSPACE/gradlew" clean :app:assembleDebug --no-daemon --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easycontrol-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
