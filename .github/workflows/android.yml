name: Universal Build for EasyControl

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify project structure
        run: |
          echo "📁 Workspace: $GITHUB_WORKSPACE"
          ls -la
          echo "🔍 Checking for gradlew..."
          find . -name "gradlew" -type f

      - name: Make gradlew executable
        run: |
          if [ -f "$GITHUB_WORKSPACE/gradlew" ]; then
            chmod +x "$GITHUB_WORKSPACE/gradlew"
            echo "✅ gradlew made executable"
          else
            echo "❌ gradlew not found at root. Trying ./app/gradlew..."
            if [ -f "$GITHUB_WORKSPACE/app/gradlew" ]; then
              chmod +x "$GITHUB_WORKSPACE/app/gradlew"
              echo "✅ app/gradlew made executable"
            else
              echo "ERROR: No gradlew found! Expected at root or app/"
              exit 1
            fi
          fi

      - name: Ensure settings.gradle includes :app
        run: |
          if [ -f settings.gradle ]; then
            if ! grep -q "include.*:app" settings.gradle; then
              echo "include ':app'" >> settings.gradle
              echo "✅ Added ':app' to settings.gradle"
            fi
          elif [ -f settings.gradle.kts ]; then
            if ! grep -q "include.*\"app\"" settings.gradle.kts; then
              echo "include(\":app\")" >> settings.gradle.kts
              echo "✅ Added ':app' to settings.gradle.kts"
            fi
          else
            echo "Creating minimal settings.gradle..."
            echo "include ':app'" > settings.gradle
          fi

      - name: Clean and build
        run: |
          # Use absolute path to gradlew
          GRADLEW="$GITHUB_WORKSPACE/gradlew"
          if [ ! -f "$GRADLEW" ]; then
            GRADLEW="$GITHUB_WORKSPACE/app/gradlew"
          fi
          if [ -f "$GRADLEW" ]; then
            echo "🚀 Running: $GRADLEW clean :app:assembleDebug --no-daemon --info"
            "$GRADLEW" clean :app:assembleDebug --no-daemon --info
          else
            echo "FATAL: gradlew not found after all checks"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: easycontrol-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/mapping/debug/mapping.txt
