name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List files in root directory
      run: ls -la

    - name: Find gradlew file
      run: find . -name "gradlew" -type f

    - name: Check if gradlew exists in root
      run: |
        if [ -f "./gradlew" ]; then
          echo "gradlew found in root directory"
          ls -la ./gradlew
        else
          echo "gradlew NOT found in root directory"
          pwd
          ls -la
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable (if exists)
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          echo "Made gradlew executable"
        else
          echo "gradlew not found in root directory"
          exit 1
        fi

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: Check Gradle version
      run: ./gradlew -v

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run tests
      run: ./gradlew test --stacktrace

    - name: Build with Gradle
      run: ./gradlew build --no-daemon

    - name: Generate APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
