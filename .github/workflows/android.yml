name: Build EasyControl APK (Fixed Permissions)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ github.token }}

      - name: Force executable permission for gradlew
        run: |
          touch gradlew 2>/dev/null || true
          chmod +x gradlew gradlew.bat || echo "Ignoring chmod errors..."

      - name: Verify gradlew exists and is executable
        run: |
          ls -la gradlew*
          test -x gradlew && echo "✅ gradlew is executable" || echo "⚠️ Still not executable"
          ./gradlew --version 2>&1 | head -n 2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-tools: "platform-tools;34.0.0,build-tools;34.0.0,platforms;android-34"

      - name: Clean Project
        run: ./gradlew clean --no-daemon

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --rerun-tasks

      - name: Verify APK/AAB exists
        run: |
          echo "🔍 Searching for build outputs..."
          find app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -exec ls -lh {} \;

      - name: Upload APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: easycontrol-debug
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
