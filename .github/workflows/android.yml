name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List all files in repository
      run: find . -type f -name "*gradlew*" -exec ls -la {} \;

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Locate and make gradlew executable
      run: |
        # 查找 gradlew 文件
        GRADLEW_PATH=$(find . -name "gradlew" -type f | head -n 1)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file not found in repository"
          exit 1
        fi
        
        echo "Found gradlew at: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        
        # 将找到的路径保存到环境变量中，供后续步骤使用
        echo "GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV

    - name: Validate Gradle wrapper
      run: $GRADLEW_PATH --version
      if: env.GRADLEW_PATH != ''

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run tests
      run: $GRADLEW_PATH test --stacktrace
      if: env.GRADLEW_PATH != ''

    - name: Build with Gradle
      run: $GRADLEW_PATH build --no-daemon
      if: env.GRADLEW_PATH != ''

    - name: Generate APK
      run: $GRADLEW_PATH assembleDebug --no-daemon
      if: env.GRADLEW_PATH != ''

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
