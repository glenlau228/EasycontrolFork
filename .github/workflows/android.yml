name: Build EasyControl APK (Auto-Generate gradlew)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate gradlew scripts
        run: |
          # 创建 gradlew (Linux)
          echo '#!/bin/sh' > gradlew
          echo 'java -jar gradle/wrapper/gradle-wrapper.jar "$@"' >> gradlew
          chmod +x gradlew

          # 创建 gradlew.bat (Windows, for compatibility)
          echo '@echo off' > gradlew.bat
          echo 'java -jar gradle\wrapper\gradle-wrapper.jar %*' >> gradlew.bat

          # 验证
          ls -la gradlew gradlew.bat
          ./gradlew --version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-tools: "platform-tools;34.0.0,build-tools;34.0.0,platforms;android-34"

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easycontrol-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
