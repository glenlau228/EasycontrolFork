name: Build EasyControl APK (Fixed Permissions)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 👇 关键！让 Git 保留可执行权限
          lfs: false
          token: ${{ github.token }}

      - name: Force executable permission for gradlew
        run: |
          # 即使文件无 x 权限，也强制添加
          touch gradlew 2>/dev/null || true
          chmod +x gradlew gradlew.bat || echo "Ignoring chmod errors..."

      - name: Verify gradlew exists and is executable
        run: |
          ls -la gradlew*
          test -x gradlew && echo "✅ gradlew is executable" || echo "⚠️ Still not executable"
          ./gradlew --version 2>&1 | head -n 2
		  
      - name: Validate gradlew integrity (not just permissions)
        run: |
          echo "🔍 Checking gradlew..."
          
          # 1. Check existence and size
          if [ ! -f "./gradlew" ]; then
            echo "❌ gradlew not found"
            exit 1
          fi
          
          SIZE=$(stat -c%s "./gradlew" 2>/dev/null || wc -c < "./gradlew")
          echo "filesize: ${SIZE} bytes"
          
          if [ "$SIZE" -eq 0 ]; then
            echo "❌ gradlew is EMPTY (0 bytes) — cannot execute!"
            exit 1
          fi
          
          # 2. Check if it's a valid shell script (starts with #!)
          if ! head -c 2 "./gradlew" | grep -q '^#!'; then
            echo "⚠️ gradlew does NOT start with '#!' — may not be a Unix script"
            # Optional: try to detect Windows .bat? (unlikely in Linux runner)
          fi
          
          # 3. Try minimal execution (safe: --help, not build)
          echo "🧪 Testing: ./gradlew --help (first 3 lines)"
          timeout 10s ./gradlew --help 2>&1 | head -n 3 || {
            echo "❌ gradlew failed to run even with --help"
            echo "Full error:"
            ./gradlew --help 2>&1
            exit 1
          }
          
          echo "✅ gradlew is present, non-empty, and responds to --help"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-tools: "platform-tools;34.0.0,build-tools;34.0.0,platforms;android-34"

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easycontrol-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
